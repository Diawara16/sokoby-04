services:
  relay:
    build: .
    image: namecheap-relay:1.0
    container_name: namecheap-relay
    restart: unless-stopped
    environment:
      PORT: "8080"
      RELAY_TOKEN: "${RELAY_TOKEN:?RELAY_TOKEN required}"
    # Bind only to loopback; Caddy terminates TLS on :443 and proxies in.
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: namecheap-relay-caddy
    restart: unless-stopped
    depends_on: [relay]
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_DOMAIN: "${RELAY_DOMAIN:?RELAY_DOMAIN required, e.g. ncproxy.sokoby.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
